name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create --org com.krishno --project-name phone_info myapp

      - name: Copy main.dart
        run: cp lib/main.dart myapp/lib/main.dart

      - name: Copy pubspec.yaml
        run: cp pubspec.yaml myapp/pubspec.yaml

      - name: Fix Kotlin version
        working-directory: myapp/android
        run: |
          sed -i 's/ext.kotlin_version.*/ext.kotlin_version = "1.9.10"/' build.gradle
          sed -i 's/org.jetbrains.kotlin:kotlin-gradle-plugin:.*/org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10"/' build.gradle

      - name: Build APK
        working-directory: myapp
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: phone-info-apk
          path: myapp/build/app/outputs/flutter-apk/app-release.apk
