plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.phone_info"
    compileSdk 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.example.phone_info"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

// Ensure module-level alignment of Kotlin stdlib as an additional safeguard.
configurations.all {
    resolutionStrategy {
        // Force the app module to use the same kotlin stdlib-jdk8 version.
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
    }
}

flutter {
    source "../.."
}
